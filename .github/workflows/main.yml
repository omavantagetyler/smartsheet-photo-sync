name: Master Smartsheet Photo Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-photos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install smartsheet-python-sdk requests pandas

      - name: Run Master Sync
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          SMARTSHEET_API_TOKEN: ${{ secrets.SMARTSHEET_API_TOKEN }}
          CONTROL_SHEET_ID: ${{ secrets.CONTROL_SHEET_ID }}
        run: python master_sync.py
